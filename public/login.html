<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - My Website</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center">Login</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login ဝင်မည်</button>
        </form>
        <div class="link">အကောင့်မရှိသေးဘူးလား? <a href="register.html">ဒီမှာ ဖွင့်ပါ</a></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await response.json();
            if (response.ok) {
                alert("မင်္ဂလာပါ " + result.user);
                // Login အောင်မြင်ရင် Blog တင်တဲ့ Admin Page ဆီကို လွှတ်လိုက်မယ်
                window.location.href = 'admin.html';
            } else {
                alert(result.error);
            }
        });
    </script>
</body>
</html>
